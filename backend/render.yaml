services:
  - type: web
    name: fund-research-dashboard-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: USER_API_BASE_URL
        sync: false
      - key: USER_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: CACHE_TTL_MS
        value: "60000"
